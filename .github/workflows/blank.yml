# This is a basic workflow to help you get started with Actions
# This is a basic workflow to help you get started with Actions
name: k6 Load Test

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  schedule:
    - cron: '0 4 * * 0'  # 每周日 UTC 04:00 = 北京时间 12:00

  workflow_dispatch:

jobs:
  loadtest:

    runs-on: ubuntu-latest

    # 需要写权限才能 git push 回仓库
    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: script.js

      - name: Move reports to workspace
        if: always()
        run: |
          echo "🔍 Searching for result.html and summary.json..."

          for FILE in result.html summary.json; do
            if [ -f "$GITHUB_WORKSPACE/$FILE" ]; then
              echo "✅ $FILE already in workspace"
            else
              FOUND=$(find /home /root /tmp -name "$FILE" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                cp "$FOUND" "$GITHUB_WORKSPACE/$FILE"
                echo "✅ Copied $FILE from $FOUND"
              else
                echo "⚠️  $FILE not found, creating placeholder"
                echo "<html><body><h1>$FILE not generated</h1></body></html>" > "$GITHUB_WORKSPACE/$FILE"
              fi
            fi
          done

          echo "📂 Workspace files:"
          ls -lh "$GITHUB_WORKSPACE"/*.html "$GITHUB_WORKSPACE"/*.json 2>/dev/null || echo "No report files found"

      - name: Commit reports to repository   # ← 核心：推送文件到仓库
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add result.html summary.json

          # 只有文件有变化时才 commit，避免空提交报错
          if git diff --cached --quiet; then
            echo "⚠️  No changes to commit"
          else
            git commit -m "ci: update k6 report [skip ci]"
            git push origin master
            echo "✅ Reports committed and pushed to repository"
          fi

      - name: Upload reports as artifact (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-report
          path: |
            result.html
            summary.json
          retention-days: 30


